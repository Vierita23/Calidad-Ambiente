@if (toast.mensajes().length) {
  <div class="toast-stack" aria-live="polite">
    @for (m of toast.mensajes(); track m.id) {
      <div class="toast" [class.toast--ok]="m.tipo === 'ok'" [class.toast--info]="m.tipo === 'info'" role="status">
        <span class="toast__text">{{ m.texto }}</span>
        <button type="button" class="toast__close" (click)="toast.quitar(m.id)" aria-label="Cerrar">×</button>
      </div>
    }
  </div>
}
