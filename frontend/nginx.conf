# =============================================================================
# Archivo: nginx.conf
# Carpeta: frontend/
# Propósito: Configuración del contenedor Nginx para SPA Angular + proxy API.
# =============================================================================
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy hacia Django en la red interna de Docker Compose (servicio `backend`).
  location /api/ {
    proxy_pass http://backend:8000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Rutas del router de Angular: si no existe archivo físico, cae a index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
