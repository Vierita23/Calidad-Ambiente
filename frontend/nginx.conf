# =============================================================================
# Archivo: nginx.conf
# Carpeta: frontend/
# Propósito: Configuración del contenedor Nginx para SPA Angular + proxy API.
# =============================================================================
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # DNS embebido de Docker: permite resolver `backend` cuando arranca antes que el API.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Proxy hacia Django (servicio `backend`).
  # Con `proxy_pass` + variable, NO uses un path fijo (`/api/`): nginx puede enviar
  # solo la raíz del API y perder `productos/` y los `?query=`, devolviendo `{}` de 47 B.
  location /api/ {
    set $django_upstream http://backend:8000;
    proxy_pass $django_upstream$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Rutas del router de Angular: si no existe archivo físico, cae a index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
